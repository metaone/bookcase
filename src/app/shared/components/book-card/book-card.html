<div class="user-select-none" [routerLink]="['/books', book().id]">
  <div class="cover-wrapper">
    <img ngSrc="covers/{{ book().coverImage }}" fill />
  </div>

  <div class="metadata-wrapper">
    <div class="text-truncate">
      <span class="">{{ book().title }}</span>
    </div>
  </div>
</div>
