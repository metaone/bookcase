<div class="container page-container">
  <div class="card shadow">
    <div class="card-body">
      <nav>
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a routerLink="/">Головна</a>
          </li>
          <li class="breadcrumb-item">
            <a routerLink="/authors">Автори</a>
          </li>
          <li class="breadcrumb-item">
            {{ author().name }}
          </li>
        </ol>
      </nav>

      <div class="row">
        @for (book of booksList(); track $index) {
          <app-book-card
            class="col-4 col-md-3 col-lg-2"
            [book]="book">
          </app-book-card>
        } @empty {
          <app-no-results></app-no-results>
        }
      </div>
    </div>
  </div>
</div>
